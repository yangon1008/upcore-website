server {
    server_name www.upstreamoral.com 106.15.204.216;
    
    root /var/www/website;
    index index.html;
    
    # Universal Links - Apple App Site Association
    location /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Content-Type application/json;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri $uri/ =404;
    }
    
    # API 代理
    location /api {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 上传文件访问
    location /uploads {
        alias /var/www/website/uploads;
        expires 30d;
        add_header Cache-Control "public";
    }
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态资源缓存 - 调整缓存策略
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|mp4|webp)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.upstreamoral.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.upstreamoral.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = www.upstreamoral.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name www.upstreamoral.com 106.15.204.216;
    return 404; # managed by Certbot


}
