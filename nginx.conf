# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name www.upstreamoral.com 106.15.204.216;
    return 301 https://$server_name$request_uri;
}

# HTTPS 配置
server {
    listen 443 ssl http2;
    server_name www.upstreamoral.com 106.15.204.216;
    
    root /var/www/website;
    index index.html;
    
    # SSL 证书配置（Certbot 会自动填写）
    ssl_certificate /etc/letsencrypt/live/www.upstreamoral.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.upstreamoral.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # API 代理
    location /api {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 上传文件访问
    location /uploads {
        alias /var/www/website/uploads;
        expires 30d;
        add_header Cache-Control "public";
    }
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|mp4|webp)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
